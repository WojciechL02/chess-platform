services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env

  users-service:
    build:
      context: .
      dockerfile: services/users-service/Dockerfile
    env_file: .env

  game-service:
    build:
      context: .
      dockerfile: services/game-service/Dockerfile
    env_file: .env

  matchmaker:
    build:
      context: .
      dockerfile: services/matchmaker/Dockerfile
    env_file: .env

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    env_file: .env
